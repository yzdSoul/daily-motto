<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典名句 - 每日格言</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.min.css', v=6) }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">📜 每日格言</a>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/all" class="nav-link">格言</a>
                <a href="/quotes" class="nav-link active">名句</a>
                <a href="/jokes" class="nav-link">冷笑话</a>
                <a href="/search" class="nav-link">搜索</a>
                <a href="/submit" class="nav-link">投稿</a>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>经典名句</h1>
            <p class="page-desc">收录 <strong>{{ total }}</strong> 条经典名句 · 小说 · 电影 · 动漫</p>
        </div>
    </div>

    <main class="container">
        <!-- 分类过滤器 -->
        <div class="filter-bar">
            <a href="/quotes" class="filter-tag {% if current_category == '全部' %}active{% endif %}">全部</a>
            {% for cat in categories %}
            <a href="/quotes?category={{ cat }}" class="filter-tag {% if current_category == cat %}active{% endif %}">{{ cat }}</a>
            {% endfor %}
        </div>

        <!-- 名句列表 -->
        <div class="quotes-list">
            {% for q in quotes %}
            <div class="quote-card" onclick="copyText(`{{ q.cn }}\n{{ q.en }}\n—— {{ q.author }}`)" title="点击复制">
                <div class="quote-content">
                    <p class="quote-cn">{{ q.cn }}</p>
                    <p class="quote-en">{{ q.en }}</p>
                </div>
                <div class="quote-footer">
                    <span class="quote-author">—— {{ q.author }}</span>
                    <span class="quote-category">{{ q.category }}</span>
                </div>
            </div>
            {% endfor %}
        </div>

        {% if not quotes %}
        <div class="empty-state">
            <p>😶 这个分类下暂时没有名句</p>
        </div>
        {% endif %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>📜 每日格言 · Daily Motto</p>
        </div>
    </footer>

    <div id="toast" class="toast">已复制到剪贴板 📋</div>
    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }
    </script>
</body>
</html>
